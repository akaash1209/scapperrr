<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Newsletter Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" fill="transparent"/>
                    <line x1="8" y1="10" x2="8" y2="14" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="16" y1="10" x2="16" y2="14" />
                </svg>
                <h2>ekaki</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-filter="all"><i class="fa-solid fa-home"></i> Latest (24h)</button>
                <button class="nav-btn" data-filter="saved"><i class="fa-solid fa-bookmark"></i> Saved Articles</button>
                <div class="divider"></div>
                <p class="nav-section-title">Sources</p>
                <button class="nav-btn" data-filter="benbites"><i class="fa-solid fa-envelope"></i> Ben Bites</button>
                <button class="nav-btn" data-filter="airundown"><i class="fa-solid fa-newspaper"></i> AI Rundown</button>
                <button class="nav-btn" data-filter="reddit"><i class="fa-brands fa-reddit-alien"></i> Reddit</button>
            </nav>
            <div class="status-indicator">
                <div class="dot pulse"></div>
                <span>Live Data Sync</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 id="page-title">Latest Updates</h1>
                    <p class="subtitle">Curated AI news from the last 24 hours.</p>
                </div>
                <div class="header-actions">
                    <button id="refresh-btn" class="action-btn"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
                </div>
            </header>

            <!-- Articles Grid -->
            <div class="articles-grid" id="articles-container">
                <!-- Cards will be injected by app.js -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
